<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0B1120;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .glow {
    position: absolute;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,85,90,0.3) 0%, transparent 70%);
  }
  .logo {
    display: inline-flex;
    align-items: baseline;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 900;
    font-size: 3.2rem;
    letter-spacing: -0.02em;
    margin-bottom: 2.5rem;
    position: relative;
    z-index: 1;
  }
  .logo span:first-child { color: #fff; }
  .logo span:last-child {
    background: #A1EAFB;
    color: #000;
    padding: 0.18em 0.22em 0.22em;
    border-radius: 12px;
    margin-left: 3px;
  }
  h1 {
    font-size: 3.5rem;
    font-weight: 900;
    color: #fafafa;
    text-align: center;
    line-height: 1.15;
    letter-spacing: -0.03em;
    max-width: 900px;
    position: relative;
    z-index: 1;
  }
  h1 em {
    font-style: normal;
    background: linear-gradient(135deg, #A1EAFB, #d4f5fd);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 0.04em;
  }
  .sub {
    color: #94a3b8;
    font-size: 1.4rem;
    margin-top: 1.5rem;
    position: relative;
    z-index: 1;
  }
  .terminal {
    margin-top: 2rem;
    background: #111827;
    border: 1px solid rgba(0,85,90,0.4);
    border-radius: 12px;
    padding: 1rem 1.5rem;
    font-family: 'Courier New', monospace;
    font-size: 1.1rem;
    color: #fff;
    max-width: 600px;
    width: 100%;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 30px rgba(161,234,251,0.08);
  }
  .terminal .prompt { color: #94a3b8; }
  .dots { display: flex; gap: 6px; margin-bottom: 0.75rem; }
  .dots span { width: 11px; height: 11px; border-radius: 50%; }
  .dots span:nth-child(1) { background: #ff5f57; }
  .dots span:nth-child(2) { background: #ffbd2e; }
  .dots span:nth-child(3) { background: #28c840; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="logo"><span>no</span><span>goon</span></div>
  <h1>Block porn on your PC.<br><em>PERMANENTLY</em></h1>
  <p class="sub">One terminal command. No app. No subscription.</p>
  <div class="terminal">
    <div class="dots"><span></span><span></span><span></span></div>
    <span class="prompt">$</span> curl -sL nogoon.io/setup.sh | sudo bash
  </div>
</body>
</html>
