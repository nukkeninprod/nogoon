<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reply — nogoon support</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0B1120; color: #fafafa;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    .top { padding: 14px 20px; background: #111827; border-bottom: 1px solid rgba(161,234,251,0.15); display: flex; align-items: center; gap: 12px; }
    .top img { width: 28px; height: 28px; }
    .top h1 { font-size: 15px; color: #A1EAFB; flex: 1; }
    .top .cid { font-size: 11px; color: #94a3b8; font-family: monospace; }
    .top .email-badge { font-size: 11px; color: #22c55e; background: rgba(34,197,94,0.1); padding: 2px 8px; border-radius: 4px; }

    #msgs {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .m { max-width: 70%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-break: break-word; animation: fi 0.2s ease; }
    @keyframes fi { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .m.visitor { align-self: flex-start; background: #111827; border-bottom-left-radius: 4px; }
    .m.agent { align-self: flex-end; background: #00555A; border-bottom-right-radius: 4px; }
    .m .meta { font-size: 10px; color: #94a3b8; margin-top: 4px; }
    .m.agent .meta { text-align: right; }
    .m.visitor .meta { color: #64748b; }

    .new-label { align-self: center; font-size: 11px; color: #ef4444; background: rgba(239,68,68,0.1); padding: 2px 10px; border-radius: 4px; margin: 8px 0; }

    .bar { padding: 14px 20px; background: #111827; border-top: 1px solid rgba(161,234,251,0.15); }
    .bar form { display: flex; gap: 10px; }
    .bar input {
      flex: 1; padding: 10px 14px; border-radius: 8px;
      border: 1px solid rgba(161,234,251,0.15); background: #0B1120;
      color: #fafafa; font-size: 14px; outline: none; font-family: 'Inter', sans-serif;
    }
    .bar input:focus { border-color: #00555A; }
    .bar button {
      padding: 10px 28px; border-radius: 8px; border: none;
      background: #00555A; color: #fff; font-weight: 600; font-size: 14px;
      cursor: pointer; font-family: 'Inter', sans-serif; transition: opacity 0.15s;
    }
    .bar button:hover { opacity: 0.88; }
    .bar button:disabled { opacity: 0.4; cursor: not-allowed; }

    .empty { text-align: center; color: #64748b; padding: 60px 20px; font-size: 14px; }

    /* Mobile */
    @media (max-width: 600px) {
      .m { max-width: 88%; }
    }
  </style>
</head>
<body>
  <div class="top">
    <img src="/shield.png" alt="nogoon">
    <h1>Reply to Chat</h1>
    <span class="email-badge" id="email-badge" style="display:none"></span>
    <span class="cid" id="cid"></span>
  </div>

  <div id="msgs">
    <div class="empty" id="loading">Loading chat…</div>
  </div>

  <div class="bar">
    <form id="reply-form" onsubmit="return sendReply(event)">
      <input type="text" id="reply-in" placeholder="Type your reply…" autocomplete="off" autofocus>
      <button type="submit" id="reply-btn">Send</button>
    </form>
  </div>

  <script>
    var params = new URLSearchParams(location.search);
    var chatId = params.get('c');
    var secret = params.get('s');

    if (!chatId || !secret) {
      document.body.innerHTML = '<p style="padding:40px;color:#ef4444;">Missing chat ID or secret in URL.</p>';
    }

    document.getElementById('cid').textContent = chatId;
    document.title = chatId + ' — nogoon support';

    var renderedTs = new Set();
    var lastKnownTs = 0;
    var initialLoad = true;

    function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function renderMsg(m) {
      if (renderedTs.has(m.ts)) return;
      renderedTs.add(m.ts);

      var container = document.getElementById('msgs');
      var div = document.createElement('div');
      div.className = 'm ' + (m.from === 'agent' ? 'agent' : 'visitor');
      var time = new Date(m.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      var who = m.from === 'agent' ? 'You' : 'Visitor';
      div.innerHTML = esc(m.text) + '<div class="meta">' + who + ' · ' + time + '</div>';
      container.appendChild(div);
      return div;
    }

    async function loadAll() {
      try {
        var res = await fetch('/api/chat-poll?id=' + chatId);
        if (!res.ok) throw 0;
        var data = await res.json();
        var msgs = data.messages || [];

        var container = document.getElementById('msgs');
        container.innerHTML = '';

        if (msgs.length === 0) {
          container.innerHTML = '<div class="empty">No messages yet. Waiting for visitor…</div>';
        }

        msgs.forEach(function(m) {
          renderMsg(m);
          lastKnownTs = Math.max(lastKnownTs, m.ts || 0);
        });

        container.scrollTop = container.scrollHeight;

        // Check for email
        checkEmail(msgs);
      } catch(e) {
        document.getElementById('msgs').innerHTML = '<div class="empty" style="color:#ef4444;">Failed to load. Check your connection.</div>';
      }
      initialLoad = false;
    }

    function checkEmail(msgs) {
      var emailRe = /^[\w.+\-]+@[\w.\-]+\.\w{2,}$/;
      for (var i = 0; i < msgs.length; i++) {
        if (msgs[i].from === 'user' && emailRe.test(msgs[i].text.trim())) {
          var badge = document.getElementById('email-badge');
          badge.textContent = msgs[i].text.trim();
          badge.style.display = 'inline';
          break;
        }
      }
    }

    async function pollNew() {
      try {
        var res = await fetch('/api/chat-poll?id=' + chatId + '&after=' + lastKnownTs + '&from=user');
        if (!res.ok) return;
        var data = await res.json();
        var msgs = data.messages || [];

        if (msgs.length > 0) {
          var container = document.getElementById('msgs');
          // Remove "no messages" placeholder
          var empty = container.querySelector('.empty');
          if (empty) empty.remove();

          msgs.forEach(function(m) {
            renderMsg(m);
            lastKnownTs = Math.max(lastKnownTs, m.ts || 0);
          });

          container.scrollTop = container.scrollHeight;

          // Flash title for new messages
          document.title = '🔴 New message — ' + chatId;
          setTimeout(function() { document.title = chatId + ' — nogoon support'; }, 3000);

          checkEmail(msgs);
        }
      } catch(e) {}
    }

    window.sendReply = async function(e) {
      e.preventDefault();
      var input = document.getElementById('reply-in');
      var btn = document.getElementById('reply-btn');
      var msg = input.value.trim();
      if (!msg) return false;

      btn.disabled = true;
      try {
        var res = await fetch('/api/chat-reply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chatId: chatId, message: msg, secret: secret })
        });
        if (!res.ok) throw 0;
        var data = await res.json();

        // Remove empty placeholder
        var container = document.getElementById('msgs');
        var empty = container.querySelector('.empty');
        if (empty) empty.remove();

        // Add to UI
        var ts = data.ts || Date.now();
        renderMsg({ from: 'agent', text: msg, ts: ts });
        lastKnownTs = Math.max(lastKnownTs, ts);
        container.scrollTop = container.scrollHeight;
        input.value = '';
      } catch(err) {
        alert('Failed to send reply. Check connection.');
      }
      btn.disabled = false;
      input.focus();
      return false;
    };

    // Initial load + start polling
    loadAll();
    setInterval(pollNew, 3000);
  </script>
</body>
</html>
